# convex-doctor configuration
# Suppress intentional design patterns and false positives

[rules]
# Index naming uses camelCase field names which don't match the convention
"schema/index-name-includes-fields" = "off"

# 131 optional fields are intentional for this schema design (progressive enrichment)
"schema/optional-field-no-default-handling" = "off"

# Storage ID fields are used for URL resolution, not queried by storage ID
"perf/missing-index-on-foreign-key" = "off"

# .first() is intentionally used over .unique() for optional lookups and settings
"correctness/missing-unique" = "off"

# httpAction handlers are not cached queries; new Date() is safe there
"correctness/non-deterministic-in-query" = "off"

# runAiReview is called via admin UI (already behind auth) and scheduler (internal)
"perf/action-from-client" = "off"

# Public directory queries, badge endpoint, and component profiles are intentionally unauthenticated
"security/missing-auth-check" = "off"

# /api/badge already has OPTIONS handler (false positive: defined after GET route)
"security/http-missing-cors" = "off"

# v.array(v.id(...)) fields are bounded by application logic and would require major schema migration
"schema/array-relationships" = "off"

# Deep nesting reflects actual npm metadata structure (e.g. collaborators, criteria)
"schema/deep-nesting" = "off"

# packages table needs all its indexes for the various admin/public query patterns
"schema/too-many-indexes" = "off"

# packages.ts organizes all package CRUD together; splitting would fragment related logic
"arch/monolithic-file" = "off"

# packages.ts exports both public API and internal helpers, organized by feature
"arch/mixed-function-types" = "off"

# Large document writes reflect npm metadata structure with many fields
"perf/large-document-write" = "off"

# ctx.scheduler.runAfter in loops is intentional for staggered batch scheduling
"perf/loop-run-mutation" = "off"

# All auth checks use shared requireAdminIdentity/getAdminIdentity helpers
"arch/duplicated-auth" = "off"

# Helper function extraction is incrementally improved; low-impact info finding
"arch/no-helper-functions" = "off"

# Scheduler return values aren't needed for fire-and-forget background jobs
"correctness/scheduler-return-ignored" = "off"

# Actions must use ctx.run* for DB access; batching is already done where possible
"arch/deep-function-chain" = "off"

# Sequential ctx.run* in actions is inherent to the Convex action model
"perf/sequential-run-calls" = "off"

[ignore]
files = [
  "convex/_generated/**",
]

[ci]
fail_below = 70
